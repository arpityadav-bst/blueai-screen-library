<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; padding: 16px; }
  .label { font-size: 10px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  /* Status badges (rounded-sm, inline) */
  .status { border-radius: 2px; padding: 1px 7px; font-size: 12px; font-weight: 500; text-transform: capitalize; display: inline-block; }
  /* Pill badges */
  .pill { border-radius: 9999px; padding: 2px 10px; font-size: 12px; font-weight: 500; display: inline-flex; align-items: center; gap: 4px; }
  /* Admin / env badges */
  .tag { border-radius: 6px; padding: 1px 8px; font-size: 10px; font-weight: 600; display: inline-flex; align-items: center; border: 1px solid; height: 20px; }
</style></head>
<body>
  <div class="label">Job Status Badges</div>
  <div class="row">
    <span class="status" style="background:#FEF9C3; color:#92400E;">assigned</span>
    <span class="status" style="background:#DCFCE7; color:#166534;">accepted</span>
    <span class="status" style="background:#DBEAFE; color:#1E40AF;">in-progress</span>
    <span class="status" style="background:#BBF7D0; color:#14532D;">completed</span>
    <span class="status" style="background:#FEE2E2; color:#991B1B;">declined</span>
    <span class="status" style="background:#FECACA; color:#7F1D1D;">failed</span>
    <span class="status" style="background:#CBD5E1; color:#374151;">expired</span>
    <span class="status" style="background:#E5E7EB; color:#374151;">cancelled</span>
  </div>

  <div class="label">Skill Status Pills</div>
  <div class="row">
    <span class="pill" style="background:#E0E7FF; color:#4F46E5;">
      <svg width="10" height="10" fill="#4F46E5" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
      Active
    </span>
    <span class="pill" style="background:#F1F5F9; color:#374151;">
      <svg width="10" height="10" fill="#374151" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
      Disabled
    </span>
    <span class="pill" style="background:#E0E7FF; color:#4F46E5; border: 1px solid #C7D2FE;">Scheduled</span>
    <span class="pill" style="background:#D1FAE5; color:#059669; border: 1px solid #6EE7B7;">Verified</span>
  </div>

  <div class="label">Admin / Environment Tags</div>
  <div class="row">
    <span class="tag" style="color:#7C3AED; border-color:#7C3AED;">Admin</span>
    <span class="tag" style="color:#B45309; border-color:#F59E0B;">ENGG</span>
    <span class="pill" style="background:#DBEAFE; color:#1E40AF; font-size:11px;">in-progress</span>
    <span class="pill" style="background:#DCFCE7; color:#166534; font-size:11px;">5/10 Skills Active</span>
    <div style="display:inline-flex; align-items:center; gap:4px; background:linear-gradient(to right,#0EA4C5,#7B4CFF); padding:1.5px; border-radius:999px;">
      <div style="background:#fff; border-radius:999px; padding:3px 12px; font-size:12px; font-weight:700; background:linear-gradient(to right,#0EA4C5,#7B4CFF); -webkit-background-clip:text; -webkit-text-fill-color:transparent; display:block;">✦ 2,450</div>
    </div>
  </div>

  <div class="label">Payment Amounts</div>
  <div class="row">
    <span class="pill" style="background:#E0E7FF; border:1px solid #C7D2FE; color:#4F46E5; font-size:12px; font-weight:700;">150 BCX</span>
    <span class="pill" style="background:#DCFCE7; border:1px solid #BBF7D0; color:#15803D; font-size:12px; font-weight:700;">500 BCX</span>
    <span style="font-size:24px; font-weight:700; color:#4F46E5;">150</span><span style="font-size:13px; color:#4B5563; align-self:flex-end; padding-bottom:3px;">BCX</span>
  </div>
</body></html>
