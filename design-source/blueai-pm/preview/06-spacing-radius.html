<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; padding: 16px; }
  .section-label { font-size: 10px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 10px; }
  .section-label + .section-label { margin-top: 14px; }
  .row { display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
  .space-item { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
  .space-bar { background: linear-gradient(to right, #0EA4C5, #7B4CFF); border-radius: 2px; height: 12px; }
  .space-label { font-size: 10px; color: #6B7280; }
  .space-val { font-size: 9px; color: #9CA3AF; }
  .radius-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 0; }
  .radius-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .radius-box { width: 48px; height: 36px; background: #E0E7FF; border: 2px solid #A5B4FC; }
  .radius-text { font-size: 10px; color: #6B7280; text-align: center; }
  .divider { height: 1px; background: #F3F4F6; margin: 12px 0; }
</style></head>
<body>
  <div class="section-label">Spacing Scale</div>
  <div class="row">
    <div class="space-item"><div class="space-bar" style="width:2px;"></div><div class="space-label">0.5</div><div class="space-val">2px</div></div>
    <div class="space-item"><div class="space-bar" style="width:4px;"></div><div class="space-label">1</div><div class="space-val">4px</div></div>
    <div class="space-item"><div class="space-bar" style="width:8px;"></div><div class="space-label">2</div><div class="space-val">8px</div></div>
    <div class="space-item"><div class="space-bar" style="width:12px;"></div><div class="space-label">3</div><div class="space-val">12px</div></div>
    <div class="space-item"><div class="space-bar" style="width:16px;"></div><div class="space-label">4</div><div class="space-val">16px</div></div>
    <div class="space-item"><div class="space-bar" style="width:20px;"></div><div class="space-label">5</div><div class="space-val">20px</div></div>
    <div class="space-item"><div class="space-bar" style="width:24px;"></div><div class="space-label">6</div><div class="space-val">24px</div></div>
    <div class="space-item"><div class="space-bar" style="width:32px;"></div><div class="space-label">8</div><div class="space-val">32px</div></div>
    <div class="space-item"><div class="space-bar" style="width:40px;"></div><div class="space-label">10</div><div class="space-val">40px</div></div>
  </div>

  <div class="divider"></div>
  <div class="section-label">Border Radius</div>
  <div class="radius-row">
    <div class="radius-item"><div class="radius-box" style="border-radius:2px;"></div><div class="radius-text">rounded-sm<br>2px · badge</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:8px;"></div><div class="radius-text">rounded-lg<br>8px · button</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:12px;"></div><div class="radius-text">rounded-xl<br>12px · card</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:16px;"></div><div class="radius-text">rounded-2xl<br>16px · chat</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:24px;"></div><div class="radius-text">rounded-3xl<br>24px · credits</div></div>
    <div class="radius-item"><div class="radius-box" style="border-radius:9999px;"></div><div class="radius-text">rounded-full<br>pill / avatar</div></div>
  </div>
</body></html>
