<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; padding: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
  .card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); padding: 16px; }
  .skill-card { width: 175px; }
  .chip { display:inline-flex; align-items:center; gap:3px; background:#E0E7FF; color:#4F46E5; border-radius:999px; padding:2px 8px; font-size:11px; font-weight:500; }
  .job-card { width: 200px; }
  .status { border-radius: 2px; padding: 1px 6px; font-size: 11px; font-weight: 500; background:#FEF9C3; color:#92400E; }
  .overview-card { width: 155px; }
  .icon-box { border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; }
  .btn-outline { border: 1px solid #C7D2FE; background: #EEF2FF; border-radius: 8px; padding: 8px; font-size: 12px; font-weight: 600; color: #4F46E5; width: 100%; text-align: center; cursor: pointer; }
  .empty-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 24px 16px; text-align: center; width: 200px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
</style></head>
<body>
  <!-- Skill card -->
  <div class="card skill-card">
    <div style="margin-bottom:10px;"><span class="chip">✓ Active</span></div>
    <div style="font-size:17px; font-weight:700; color:#111827; margin-bottom:5px;">coin-collector</div>
    <div style="font-size:12px; color:#6B7280; margin-bottom:14px; line-height:1.4;">Collects in-game coins automatically every cycle.</div>
    <div class="btn-outline">View Details</div>
  </div>

  <!-- Job card -->
  <div class="card job-card">
    <div style="margin-bottom:8px;"><span class="status">assigned</span></div>
    <div style="font-size:17px; font-weight:700; color:#111827; margin-bottom:4px;">Like Instagram Post</div>
    <div style="display:flex; align-items:baseline; gap:5px; margin-bottom:8px;">
      <span style="font-size:22px; font-weight:700; color:#4F46E5;">150</span>
      <span style="font-size:12px; color:#6B7280;">BCX</span>
    </div>
    <div style="font-size:12px; color:#6B7280; margin-bottom:14px;">Open Instagram and like the specified post.</div>
    <div class="btn-outline">More Info</div>
  </div>

  <!-- Overview card -->
  <div class="card overview-card">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px;">
      <div class="icon-box" style="background:#4F46E5;">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      </div>
    </div>
    <div style="font-size:20px; font-weight:700; color:#111827; margin-bottom:2px;">5/8</div>
    <div style="font-size:11px; color:#6B7280; font-weight:500;">Skills Active</div>
  </div>

  <!-- Overview card 2 -->
  <div class="card overview-card">
    <div style="display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:8px;">
      <div class="icon-box" style="background:#F97316;">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      </div>
    </div>
    <div style="font-size:20px; font-weight:700; color:#111827; margin-bottom:2px;">3</div>
    <div style="font-size:11px; color:#6B7280; font-weight:500;">Jobs Available</div>
  </div>

  <!-- Empty state card -->
  <div class="empty-card">
    <div style="width:40px; height:40px; background:#FFF7ED; border-radius:999px; display:flex; align-items:center; justify-content:center; margin:0 auto 10px;">
      <svg width="20" height="20" fill="none" stroke="#F97316" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
    </div>
    <div style="font-size:13px; font-weight:600; color:#111827; margin-bottom:4px;">No Jobs Available</div>
    <div style="font-size:11px; color:#6B7280;">Check back later for new opportunities</div>
  </div>
</body></html>
