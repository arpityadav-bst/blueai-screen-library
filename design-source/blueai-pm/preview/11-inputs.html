<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; padding: 16px; display: flex; gap: 20px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .label { font-size: 11px; font-weight: 600; color: #374151; margin-bottom: 3px; }
  .required { color: #EF4444; margin-left: 2px; }
  input, textarea { font-family: inherit; }
  .field { border: 1px solid #E5E7EB; border-radius: 8px; padding: 8px 12px; font-size: 14px; color: #374151; width: 100%; outline: none; background: #fff; }
  .field::placeholder { color: #9CA3AF; }
  .field.focus { border-color: #60A5FA; box-shadow: 0 0 0 3px rgba(96,165,250,0.15); }
  .field.error { border-color: #EF4444; }
  .error-msg { font-size: 11px; color: #EF4444; margin-top: 3px; }
  .search-wrap { position: relative; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); }
  .search-field { border: 1px solid #E5E7EB; border-radius: 9999px; padding: 10px 40px; font-size: 14px; color: #374151; width: 100%; outline: none; background: #fff; }
  .chat-wrap { display: flex; align-items: center; gap: 8px; border: 1px solid #60A5FA; border-radius: 16px; padding: 8px 14px 8px 8px; background: #fff; }
  .chat-input { border: none; outline: none; flex: 1; font-size: 14px; color: #374151; background: transparent; padding: 4px 6px; }
  .chat-input::placeholder { color: #9CA3AF; }
  .send-btn { width: 32px; height: 32px; border-radius: 50%; background: #1990FF; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider-t { position: absolute; inset: 0; background: #4F46E5; border-radius: 999px; }
  .slider-t::before { content: ''; position: absolute; width: 16px; height: 16px; left: 20px; bottom: 3px; background: #fff; border-radius: 50%; }
  .toggle-off .slider-t { background: #D1D5DB; }
  .toggle-off .slider-t::before { left: 3px; }
</style></head>
<body>
  <div class="col">
    <div>
      <div class="label">Skill Name<span class="required">*</span></div>
      <input class="field" type="text" placeholder="e.g. coin-collector" value="coin-collector">
    </div>
    <div>
      <div class="label">Description<span class="required">*</span></div>
      <input class="field focus" type="text" placeholder="What the skill does...">
    </div>
    <div>
      <div class="label">Job Prompt<span class="required">*</span></div>
      <div class="field error" style="height:56px; font-size:14px; color:#9CA3AF;">Step 1&#10;Step 2</div>
      <div class="error-msg">Job prompt is required.</div>
    </div>
    <div class="search-wrap">
      <span class="search-icon">
        <svg width="16" height="16" fill="none" stroke="#1990FF" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m21.5 21.5-5-5"/></svg>
      </span>
      <input class="search-field" type="text" placeholder="Search Skill" style="padding-left:40px;">
    </div>
  </div>
  <div class="col">
    <div>
      <div class="label">Chat Input</div>
      <div class="chat-wrap">
        <input class="chat-input" placeholder="Type your message..." style="flex:1;">
        <div class="send-btn">
          <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </div>
      </div>
    </div>
    <div>
      <div class="label">Chat Input — Awaiting Input</div>
      <div class="chat-wrap" style="border-color:#E5E7EB; opacity:0.5;">
        <input class="chat-input" placeholder="Chat terminated. Start a new chat..." disabled>
        <div class="send-btn" style="opacity:0.4;">
          <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </div>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; gap:8px;">
      <div class="label">Toggle — Skill Enabled</div>
      <div style="display:flex; gap:16px; align-items:center;">
        <div>
          <div class="toggle"><input type="checkbox" checked><span class="slider-t"></span></div>
        </div>
        <div class="toggle toggle-off"><input type="checkbox"><span class="slider-t"></span></div>
        <span style="font-size:12px; color:#6B7280;">on / off</span>
      </div>
    </div>
    <div>
      <div class="label">Checkbox — Prerequisites</div>
      <label style="display:flex; align-items:flex-start; gap:8px; cursor:pointer;">
        <input type="checkbox" checked style="width:14px; height:14px; margin-top:2px; accent-color:#4F46E5;">
        <span style="font-size:13px; color:#374151;">I confirm all prerequisites are met.</span>
      </label>
    </div>
  </div>
</body></html>
