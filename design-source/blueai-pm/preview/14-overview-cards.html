<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; padding: 16px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .card { background: #fff; border: 1px solid #E2E8F0; border-radius: 12px; padding: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: all 200ms; cursor: pointer; }
  .card:hover { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.10); border-color: #A5B4FC; background: rgba(238,242,255,0.3); }
  .icon-box { border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .value { font-size: 22px; font-weight: 700; color: #111827; margin-bottom: 2px; }
  .title { font-size: 11px; color: #4B5563; font-weight: 500; }
</style></head>
<body>
  <div class="grid">
    <div class="card">
      <div class="icon-box" style="background:#4F46E5;">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
      </div>
      <div class="value">5/8</div>
      <div class="title">Skills Active</div>
    </div>
    <div class="card">
      <div class="icon-box" style="background:#22C55E;">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <div class="value">142</div>
      <div class="title">Tasks Done</div>
    </div>
    <div class="card">
      <div class="icon-box" style="background:#F97316;">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      </div>
      <div class="value">3</div>
      <div class="title">Jobs Available</div>
    </div>
    <div class="card">
      <div class="icon-box" style="background:#A855F7;">
        <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      </div>
      <div class="value">2</div>
      <div class="title">Tasks Scheduled</div>
    </div>
  </div>
</body></html>
