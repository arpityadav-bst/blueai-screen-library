<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; padding: 16px; display: flex; gap: 16px; flex-wrap: wrap; }
  .section { display: flex; flex-direction: column; gap: 10px; }
  .label { font-size: 10px; font-weight: 700; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.05em; }
  .credits-btn { display: inline-block; background: linear-gradient(to right, #0EA4C5, #7B4CFF); padding: 1.5px; border-radius: 999px; cursor: pointer; }
  .credits-inner { background: #fff; border-radius: 999px; padding: 5px 12px; display: flex; align-items: center; gap: 5px; }
  .credits-text { font-size: 13px; font-weight: 700; background: linear-gradient(to right, #0EA4C5, #7B4CFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .alert { border-radius: 8px; padding: 12px 14px; display: flex; gap: 10px; align-items: flex-start; max-width: 320px; }
  .alert-icon { flex-shrink: 0; margin-top: 1px; }
  .modal-card { background: #fff; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.10); overflow: hidden; max-width: 320px; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #F3F4F6; }
  .modal-body { padding: 14px 18px; }
</style></head>
<body>
  <!-- Credits button states -->
  <div class="section">
    <div class="label">Credits Button — Normal</div>
    <div class="credits-btn">
      <div class="credits-inner">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1l1.236 2.507 2.764.403-2 1.95.472 2.752L6 7.373 3.528 8.612 4 5.86 2 3.91l2.764-.403L6 1z" fill="#0EA4C5"/></svg>
        <span class="credits-text">2,450</span>
      </div>
    </div>
    <div class="label">Credits Button — Low Balance</div>
    <div style="position:relative; display:inline-block;">
      <div class="credits-btn">
        <div class="credits-inner">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1l1.236 2.507 2.764.403-2 1.95.472 2.752L6 7.373 3.528 8.612 4 5.86 2 3.91l2.764-.403L6 1z" fill="#0EA4C5"/></svg>
          <span class="credits-text">45</span>
        </div>
      </div>
      <span style="position:absolute; top:2px; right:2px; width:8px; height:8px; background:#EF4444; border-radius:50%; border:1.5px solid #fff;"></span>
    </div>
  </div>

  <!-- Credit alerts -->
  <div class="section">
    <div class="label">Alerts</div>
    <div class="alert" style="background:#FFF7ED; border:1px solid #FED7AA;">
      <div class="alert-icon"><svg width="18" height="18" fill="none" stroke="#F97316" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg></div>
      <div>
        <div style="font-size:12px; font-weight:600; color:#9A3412;">Low Balance Alert</div>
        <div style="font-size:11px; color:#C2410C; margin-top:2px;">Top up your balance now to continue using BlueAI</div>
      </div>
    </div>
    <div class="alert" style="background:#FEF3C7; border:1px solid #FDE68A;">
      <div class="alert-icon"><svg width="18" height="18" fill="none" stroke="#D97706" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg></div>
      <div>
        <div style="font-size:12px; font-weight:600; color:#92400E;">Usage Alert</div>
        <div style="font-size:11px; color:#B45309; margin-top:2px;">You've consumed 90% of your daily credit limit.</div>
      </div>
    </div>
  </div>

  <!-- Logout confirm modal -->
  <div class="section">
    <div class="label">Confirm Modal</div>
    <div class="modal-card">
      <div class="modal-header">
        <span style="font-size:15px; font-weight:600; color:#111827;">Sign Out</span>
        <button style="background:none;border:none;cursor:pointer;color:#9CA3AF; padding:4px; border-radius:6px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <p style="font-size:13px; color:#374151; margin-bottom:14px;">Are you sure you want to sign out?</p>
        <div style="display:flex; gap:8px; justify-content:flex-end;">
          <button style="border:1px solid #D1D5DB; background:#fff; border-radius:8px; padding:7px 16px; font-size:13px; font-weight:500; color:#374151; cursor:pointer; font-family:inherit;">Cancel</button>
          <button style="background:#1990FF; border:none; border-radius:8px; padding:7px 16px; font-size:13px; font-weight:500; color:#fff; cursor:pointer; font-family:inherit;">Sign Out</button>
        </div>
      </div>
    </div>
  </div>
</body></html>
