<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; padding: 20px; }
  .row { display: flex; gap: 16px; align-items: flex-start; }
  .item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .card { background: #fff; border-radius: 12px; width: 100%; padding: 14px; border: 1px solid #E2E8F0; }
  .label { font-size: 11px; font-weight: 700; color: #6B7280; text-align: center; }
  .sub { font-size: 10px; color: #9CA3AF; text-align: center; }
</style></head>
<body>
  <div class="row">
    <div class="item">
      <div class="card" style="box-shadow: 0 1px 2px 0 rgba(0,0,0,0.05);">
        <div style="font-size:12px; font-weight:600; color:#374151;">shadow-sm</div>
        <div style="font-size:11px; color:#9CA3AF; margin-top:2px;">Default cards</div>
      </div>
      <div class="sub">0 1px 2px rgba(0,0,0,0.05)</div>
    </div>
    <div class="item">
      <div class="card" style="box-shadow: 0 4px 6px -1px rgba(0,0,0,0.10), 0 2px 4px -2px rgba(0,0,0,0.10);">
        <div style="font-size:12px; font-weight:600; color:#374151;">shadow-md</div>
        <div style="font-size:11px; color:#9CA3AF; margin-top:2px;">Card hover state</div>
      </div>
      <div class="sub">hover:shadow-md</div>
    </div>
    <div class="item">
      <div class="card" style="box-shadow: 0 20px 25px -5px rgba(0,0,0,0.10), 0 8px 10px -6px rgba(0,0,0,0.10);">
        <div style="font-size:12px; font-weight:600; color:#374151;">shadow-xl</div>
        <div style="font-size:11px; color:#9CA3AF; margin-top:2px;">Modals, overlays</div>
      </div>
      <div class="sub">modals · overlays</div>
    </div>
    <div class="item">
      <div class="card" style="box-shadow: 0 4px 6px -1px rgba(79,70,229,0.20); border-color:#C7D2FE;">
        <div style="font-size:12px; font-weight:600; color:#4F46E5;">shadow-indigo</div>
        <div style="font-size:11px; color:#9CA3AF; margin-top:2px;">User chat bubbles</div>
      </div>
      <div class="sub">rgba(79,70,229,0.20)</div>
    </div>
    <div class="item">
      <div class="card" style="box-shadow: none; border: 1px solid #CBD5E1; border-bottom-width:2px;">
        <div style="font-size:12px; font-weight:600; color:#374151;">Navbar border</div>
        <div style="font-size:11px; color:#9CA3AF; margin-top:2px;">border-b-2 slate-200</div>
      </div>
      <div class="sub">border-b-2 border-slate-200</div>
    </div>
  </div>
</body></html>
