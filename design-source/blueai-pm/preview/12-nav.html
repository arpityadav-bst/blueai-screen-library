<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9FAFB; padding: 0; }
  .navbar { background: #fff; border-bottom: 2px solid #E2E8F0; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
  .logo-area { display: flex; align-items: center; gap: 8px; }
  .logo-img { width: 32px; height: 32px; border-radius: 6px; background: linear-gradient(135deg, #0EA4C5, #7B4CFF); display: flex; align-items: center; justify-content: center; }
  .logo-text { font-size: 22px; font-weight: 700; background: linear-gradient(to right, #0EA4C5, #7B4CFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
  .admin-tag { border: 1px solid #7C3AED; border-radius: 6px; padding: 1px 8px; font-size: 10px; font-weight: 600; color: #7C3AED; }
  .right { display: flex; align-items: center; gap: 8px; }
  .credits-btn { background: linear-gradient(to right, #0EA4C5, #7B4CFF); padding: 1.5px; border-radius: 999px; cursor: pointer; }
  .credits-inner { background: #fff; border-radius: 999px; padding: 5px 12px; display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; background: linear-gradient(to right, #0EA4C5, #7B4CFF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #E0E7FF; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .menu-btn { width: 36px; height: 36px; border-radius: 8px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .edit-btn { width: 36px; height: 36px; border-radius: 8px; background: transparent; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .dropdown { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.10), 0 2px 4px -2px rgba(0,0,0,0.10); overflow: hidden; width: 180px; margin: 12px 20px 0 auto; }
  .dd-item { display: flex; align-items: center; gap: 10px; padding: 11px 16px; font-size: 14px; color: #374151; cursor: pointer; }
  .dd-item:hover, .dd-item.active { background: #EEF2FF; color: #4F46E5; }
  .dd-item svg { flex-shrink: 0; }
  .notif-dot { width: 8px; height: 8px; background: #EF4444; border-radius: 50%; position: absolute; top: 4px; right: 4px; }
</style></head>
<body>
  <!-- Navbar -->
  <div class="navbar">
    <div class="logo-area">
      <div class="logo-img">
        <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
      </div>
      <span class="logo-text">BlueAI</span>
      <span class="admin-tag">Admin</span>
    </div>
    <div class="right">
      <div style="position:relative; display:inline-block;">
        <div class="credits-btn">
          <div style="background:#fff; border-radius:999px; padding:5px 12px; display:flex; align-items:center; gap:5px;">
            <span style="font-size:13px; font-weight:700; background:linear-gradient(to right,#0EA4C5,#7B4CFF); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">✦ 2,450</span>
          </div>
        </div>
      </div>
      <div class="avatar">
        <svg width="18" height="18" fill="none" stroke="#4F46E5" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      </div>
      <div class="menu-btn" style="position:relative;">
        <svg width="22" height="22" fill="#374151" viewBox="0 0 24 24"><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
      </div>
      <div class="edit-btn">
        <svg width="22" height="22" fill="none" stroke="#6B7280" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
      </div>
    </div>
  </div>

  <!-- Dropdown menu open state -->
  <div class="dropdown">
    <div class="dd-item active">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      Chat History
    </div>
    <div class="dd-item">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
      Profile
    </div>
    <div class="dd-item">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
      Report Issue
    </div>
    <div class="dd-item">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      Logout
    </div>
  </div>
</body></html>
