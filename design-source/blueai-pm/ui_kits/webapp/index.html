<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlueAI — UI Kit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F9FAFB;
      color: #111827;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.25) #E2E8F0;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #E2E8F0; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.25); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.4); }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Navbar.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Chat.jsx"></script>
<script type="text/babel" src="Jobs.jsx"></script>
<script type="text/babel" src="Skills.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const ROUTES = {
  chat: 'chat',
  dashboard: 'dashboard',
  jobs: 'jobs',
  skills: 'skills',
  schedule: 'schedule',
  profile: 'profile',
  wallet: 'wallet',
};

function SchedulePlaceholder() {
  return (
    <div style={{ paddingBottom: 60 }}>
      <h1 style={{ fontSize: 20, fontWeight: 700, color: '#111827', marginBottom: 14 }}>Scheduled Tasks</h1>
      <div style={{ background: '#fff', border: '1px solid #E2E8F0', borderRadius: 12, padding: '40px 20px', textAlign: 'center', boxShadow: '0 1px 2px rgba(0,0,0,0.05)' }}>
        <div style={{ width: 56, height: 56, background: '#F3E8FF', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 14px' }}>
          <svg width="26" height="26" fill="none" stroke="#9333EA" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </div>
        <h2 style={{ fontSize: 16, fontWeight: 600, color: '#111827', marginBottom: 6 }}>No Scheduled Tasks</h2>
        <p style={{ fontSize: 13, color: '#6B7280', marginBottom: 18 }}>Schedule jobs to run automatically at specific times</p>
        <button style={{ background: '#EEF2FF', border: '1px solid #C7D2FE', borderRadius: 8, padding: '9px 20px', fontSize: 14, fontWeight: 600, color: '#4F46E5', cursor: 'pointer', fontFamily: 'inherit' }}>Create Schedule</button>
      </div>
    </div>
  );
}

function ProfilePlaceholder() {
  return (
    <div style={{ paddingBottom: 60, maxWidth: 520 }}>
      <h1 style={{ fontSize: 20, fontWeight: 700, color: '#111827', marginBottom: 18 }}>User Profile</h1>
      <div style={{ background: '#fff', border: '1px solid #E2E8F0', borderRadius: 12, padding: 24, boxShadow: '0 1px 2px rgba(0,0,0,0.05)', marginBottom: 16 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24 }}>
          <div style={{ width: 64, height: 64, borderRadius: '50%', background: '#E0E7FF', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
            <svg width="32" height="32" fill="none" stroke="#4F46E5" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <div>
            <div style={{ fontSize: 18, fontWeight: 700, color: '#111827' }}>Alex Johnson</div>
            <div style={{ fontSize: 13, color: '#6B7280', marginTop: 2 }}>Member · alex@nowgg.com</div>
          </div>
        </div>
        {[['Handle', 'alex_j'], ['Email', 'alex@nowgg.com'], ['Country', 'United States'], ['Mobile', 'Not set']].map(([k, v]) => (
          <div key={k} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '12px 0', borderBottom: '1px solid #F3F4F6' }}>
            <span style={{ fontSize: 13, color: '#6B7280', fontWeight: 500 }}>{k}</span>
            <span style={{ fontSize: 13, color: v === 'Not set' ? '#9CA3AF' : '#111827', fontWeight: v === 'Not set' ? 400 : 500 }}>{v}</span>
          </div>
        ))}
      </div>
      <button style={{ background: 'none', border: '1px solid #E2E8F0', borderRadius: 8, padding: '9px 20px', fontSize: 14, fontWeight: 500, color: '#374151', cursor: 'pointer', fontFamily: 'inherit' }}>Sign out</button>
    </div>
  );
}

function BottomNav({ route, onNavigate }) {
  const items = [
    { id: 'dashboard', label: 'Home', icon: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg> },
    { id: 'chat', label: 'Chat', icon: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg> },
    { id: 'jobs', label: 'Jobs', icon: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg> },
    { id: 'skills', label: 'Skills', icon: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg> },
    { id: 'schedule', label: 'Schedule', icon: <svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg> },
  ];

  return (
    <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, background: '#fff', borderTop: '1px solid #E2E8F0', display: 'flex', zIndex: 40, paddingBottom: 'env(safe-area-inset-bottom)' }}>
      {items.map(item => {
        const active = route === item.id;
        return (
          <button key={item.id} onClick={() => onNavigate(item.id)}
            style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3, padding: '10px 4px 8px', border: 'none', background: 'none', cursor: 'pointer', color: active ? '#4F46E5' : '#9CA3AF', transition: 'color 150ms', fontFamily: 'inherit' }}>
            {item.icon}
            <span style={{ fontSize: 10, fontWeight: active ? 600 : 400 }}>{item.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [route, setRoute] = useState('chat');

  const navigate = (r) => {
    if (ROUTES[r] !== undefined) setRoute(r);
  };

  const renderContent = () => {
    switch (route) {
      case 'chat':     return <Chat />;
      case 'dashboard': return <Dashboard onNavigate={navigate} onNewChat={() => navigate('chat')} />;
      case 'jobs':     return <Jobs />;
      case 'skills':   return <Skills />;
      case 'schedule': return <SchedulePlaceholder />;
      case 'profile':  return <ProfilePlaceholder />;
      default:         return <Chat />;
    }
  };

  const isChat = route === 'chat';

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', overflow: 'hidden' }}>
      <Navbar currentRoute={route} onNavigate={navigate} onNewChat={() => navigate('chat')} />

      {/* Main content */}
      <main style={{
        flex: 1,
        overflowY: isChat ? 'hidden' : 'auto',
        marginTop: 56,
        marginBottom: 60,
        padding: isChat ? '16px 20px' : '20px',
        display: isChat ? 'flex' : 'block',
        flexDirection: isChat ? 'column' : undefined,
        maxWidth: 900,
        width: '100%',
        marginLeft: 'auto',
        marginRight: 'auto',
      }}>
        {renderContent()}
      </main>

      <BottomNav route={route} onNavigate={navigate} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
